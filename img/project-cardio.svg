<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="ecgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#fca5a5" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg4)"/>
  <!-- Grid lines -->
  <g stroke="#fca5a5" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="130" x2="600" y2="130"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="100" y1="40" x2="100" y2="220"/>
    <line x1="200" y1="40" x2="200" y2="220"/>
    <line x1="300" y1="40" x2="300" y2="220"/>
    <line x1="400" y1="40" x2="400" y2="220"/>
    <line x1="500" y1="40" x2="500" y2="220"/>
  </g>
  <!-- ECG Line -->
  <polyline
    points="40,140 80,140 95,140 105,80 115,190 125,140 165,140 180,140 195,140 205,75 215,195 225,140 265,140 280,140 295,140 305,78 315,192 325,140 365,140 380,140 395,140 405,82 415,190 425,140 465,140 480,140 510,140"
    fill="none"
    stroke="url(#ecgGrad)"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"/>
  <!-- Glow effect for peak -->
  <circle cx="305" cy="78" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="305" cy="78" r="10" fill="#ef4444" opacity="0.2"/>
  <!-- Risk score gauge (right side) -->
  <g transform="translate(510, 130)">
    <!-- Arc background -->
    <path d="M -55 0 A 55 55 0 0 1 55 0" fill="none" stroke="#fca5a5" stroke-width="6" opacity="0.15" stroke-linecap="round"/>
    <!-- Risk level arc - low/medium/high -->
    <path d="M -55 0 A 55 55 0 0 1 0 -55" fill="none" stroke="#4ade80" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <path d="M 0 -55 A 55 55 0 0 1 39 -39" fill="none" stroke="#fbbf24" stroke-width="6" opacity="0.6" stroke-linecap="round"/>
    <path d="M 39 -39 A 55 55 0 0 1 55 0" fill="none" stroke="#ef4444" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="30" y2="-46" stroke="#fca5a5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="0" cy="0" r="5" fill="#ef4444" opacity="0.9"/>
    <text x="0" y="20" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#fca5a5" opacity="0.8">RIESGO</text>
  </g>
  <!-- Stats boxes -->
  <rect x="40" y="50" width="68" height="28" rx="5" fill="rgba(239,68,68,0.12)" stroke="#fca5a5" stroke-width="0.8" opacity="0.7"/>
  <text x="74" y="62" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fca5a5">91%</text>
  <text x="74" y="73" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#fca5a5" opacity="0.7">Precision</text>
  <rect x="40" y="185" width="75" height="28" rx="5" fill="rgba(239,68,68,0.12)" stroke="#fca5a5" stroke-width="0.8" opacity="0.7"/>
  <text x="77" y="197" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fca5a5">SMOTE</text>
  <text x="77" y="208" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#fca5a5" opacity="0.7">Balanceo</text>
  <!-- Bottom bar -->
  <rect x="0" y="246" width="600" height="54" fill="rgba(35,5,10,0.9)"/>
  <text x="24" y="269" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Forecasting de Riesgo Coronario</text>
  <text x="24" y="287" font-family="Inter,sans-serif" font-size="11" fill="#fca5a5">SMOTE · Gradient Boosting · HealthTech · ML</text>
</svg>
