  <rect x="380" y="155" width="22" height="55" rx="3" fill="#10b981" opacity="0.75"/>
  <rect x="410" y="130" width="22" height="80" rx="3" fill="#059669" opacity="0.8"/>
  <rect x="440" y="110" width="22" height="100" rx="3" fill="#047857" opacity="0.85"/>
  <rect x="470" y="140" width="22" height="70" rx="3" fill="#065f46" opacity="0.9"/>
  <text x="361" y="222" font-family="Inter,sans-serif" font-size="8" fill="#6ee7b7" opacity="0.6" text-anchor="middle">R1</text>
  <text x="391" y="222" font-family="Inter,sans-serif" font-size="8" fill="#6ee7b7" opacity="0.6" text-anchor="middle">R2</text>
  <text x="421" y="222" font-family="Inter,sans-serif" font-size="8" fill="#6ee7b7" opacity="0.6" text-anchor="middle">R3</text>
  <text x="451" y="222" font-family="Inter,sans-serif" font-size="8" fill="#6ee7b7" opacity="0.6" text-anchor="middle">R4</text>
