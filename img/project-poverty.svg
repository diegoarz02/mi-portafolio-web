  <text x="415" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6ee7b7" opacity="0.6" letter-spacing="1">ÍNDICE SINTÉTICO</text>
  <!-- Bottom bar -->
  <rect x="0" y="246" width="600" height="54" fill="rgba(2,20,15,0.9)"/>
  <text x="24" y="269" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Índice de Pobreza Educativa · Perú</text>
  <text x="24" y="287" font-family="Inter,sans-serif" font-size="11" fill="#6ee7b7">R · ACM · Geoespacial · Datos ENAHO</text>
</svg>
