  <circle cx="175" cy="78" r="9" fill="#059669" opacity="0.9"/>
  <circle cx="148" cy="138" r="7" fill="#047857" opacity="0.85"/>
  <circle cx="200" cy="145" r="10" fill="#065f46" opacity="0.9"/>
  <circle cx="235" cy="95" r="7" fill="#059669" opacity="0.8"/>
  <circle cx="100" cy="190" r="8" fill="#34d399" opacity="0.8"/>
  <circle cx="215" cy="185" r="11" fill="#047857" opacity="0.9"/>
  <!-- Lines connecting to bar chart on right -->
  <line x1="340" y1="80" x2="340" y2="210" stroke="#34d399" stroke-width="1" opacity="0.2"/>
