<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg2)"/>
  <!-- Map regions (stylized Peru departments) -->
  <g opacity="0.18" fill="#34d399">
    <rect x="80" y="60" width="55" height="40" rx="4"/>
    <rect x="145" y="55" width="65" height="50" rx="4"/>
    <rect x="75" y="108" width="50" height="55" rx="4"/>
    <rect x="135" y="113" width="70" height="45" rx="4"/>
    <rect x="215" y="60" width="50" height="95" rx="4"/>
    <rect x="80" y="171" width="80" height="40" rx="4"/>
    <rect x="170" y="166" width="90" height="45" rx="4"/>
  </g>
  <!-- Color scale legend -->
  <defs>
    <linearGradient id="scale" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>
  <rect x="80" y="225" width="180" height="10" rx="5" fill="url(#scale)" opacity="0.8"/>
