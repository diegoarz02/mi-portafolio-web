<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="bgChu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="roiChu" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="funnelChu" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bgChu)"/>
  <!-- Grid lines -->
  <g stroke="#a5b4fc" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="120" y1="40" x2="120" y2="220"/>
    <line x1="300" y1="40" x2="300" y2="220"/>
  </g>
  <!-- Subtle Tokyo torii accent -->
  <g stroke="#fcd34d" stroke-width="2" opacity="0.28" fill="none" stroke-linecap="round">
    <line x1="500" y1="56" x2="572" y2="56"/>
    <line x1="506" y1="64" x2="566" y2="64"/>
    <line x1="518" y1="56" x2="518" y2="98"/>
    <line x1="554" y1="56" x2="554" y2="98"/>
  </g>
  <text x="536" y="112" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#fcd34d" opacity="0.45" letter-spacing="1">TOKYO · GCI</text>
  <!-- Retention funnel -->
  <g>
    <path d="M 55 70 L 235 70 L 205 110 L 85 110 Z" fill="url(#funnelChu)" stroke="#818cf8" stroke-width="1.2" opacity="0.9"/>
    <path d="M 88 116 L 202 116 L 178 152 L 112 152 Z" fill="url(#funnelChu)" stroke="#a78bfa" stroke-width="1.2" opacity="0.9"/>
    <path d="M 115 158 L 175 158 L 158 192 L 132 192 Z" fill="url(#funnelChu)" stroke="#c4b5fd" stroke-width="1.2" opacity="0.95"/>
    <text x="145" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#c7d2fe" opacity="0.85">Clientes</text>
    <text x="145" y="138" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#ddd6fe" opacity="0.85">En riesgo</text>
    <text x="145" y="179" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#fde68a" opacity="0.9">Retenidos</text>
  </g>
  <!-- Customer flow nodes: retained vs churned -->
  <g>
    <circle cx="262" cy="80" r="5" fill="#4ade80" opacity="0.85"/>
    <circle cx="276" cy="96" r="4" fill="#4ade80" opacity="0.7"/>
    <circle cx="258" cy="104" r="3.5" fill="#4ade80" opacity="0.6"/>
    <!-- churned (leaving) -->
    <circle cx="262" cy="135" r="5" fill="#f87171" opacity="0.8"/>
    <circle cx="280" cy="148" r="4" fill="#f87171" opacity="0.65"/>
    <path d="M 286 135 l 14 -6 m 0 0 l -5 -2 m 5 2 l -2 5" stroke="#f87171" stroke-width="1.4" fill="none" opacity="0.7"/>
  </g>
  <!-- Ascending ROI curve -->
  <path d="M 305 200 C 360 196 400 180 440 150 S 520 80 560 62"
        fill="none" stroke="url(#roiChu)" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="560" cy="62" r="4" fill="#fcd34d"/>
  <circle cx="560" cy="62" r="9" fill="#fcd34d" opacity="0.2"/>
  <!-- axis for ROI -->
  <line x1="305" y1="60" x2="305" y2="210" stroke="#c4b5fd" stroke-width="1" opacity="0.25"/>
  <line x1="305" y1="210" x2="575" y2="210" stroke="#c4b5fd" stroke-width="1" opacity="0.25"/>
  <text x="312" y="200" font-family="Inter,sans-serif" font-size="9" fill="#c4b5fd" opacity="0.55">ROI</text>
  <!-- Decile capture stat -->
  <rect x="330" y="118" width="120" height="40" rx="6" fill="rgba(251,191,36,0.12)" stroke="#fcd34d" stroke-width="0.9" opacity="0.85"/>
  <text x="390" y="136" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fcd34d">~79% churn</text>
  <text x="390" y="150" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#fde68a" opacity="0.8">decil de mayor riesgo</text>
  <text x="55" y="56" font-family="Inter,sans-serif" font-size="9" fill="#c4b5fd" opacity="0.6" letter-spacing="1">EMBUDO DE RETENCIÓN</text>
  <!-- Bottom bar -->
  <rect x="0" y="246" width="600" height="54" fill="rgba(12,8,40,0.9)"/>
  <text x="24" y="269" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Retención de Clientes Telecom · GCI Tokyo</text>
  <text x="24" y="287" font-family="Inter,sans-serif" font-size="11" fill="#c4b5fd">XGBoost · SHAP · ROI Model · Python</text>
</svg>
